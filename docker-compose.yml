services:
  mission-control:
    build: .
    container_name: mission-control
    ports:
      - "${MC_PORT:-3100}:${PORT:-3000}"
    environment:
      - PORT=${PORT:-3000}
      - HOME=/app
    env_file:
      - path: .env
        required: false
    volumes:
      - mc-data:/app/.data
      - ./data:/app/data
      # Mount OpenClaw host directories (read-only) for skills, memory, config
      - /home/openclaw/.openclaw/skills:/app/.openclaw/skills:ro
      - /home/openclaw/.openclaw/openclaw.json:/app/.openclaw/openclaw.json:ro
      - /home/openclaw/.openclaw/workspace-marty:/app/.openclaw/workspace-marty:ro
      - /home/openclaw/.openclaw/memory:/app/.openclaw/memory:ro
      - /home/openclaw/.openclaw/cron:/app/.openclaw/cron:ro
      # Tryps scope specs for criteria tracker
      - /home/openclaw/tryps-docs/scopes:/app/tryps-docs/scopes:ro
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
          pids: 256
    networks:
      - mc-net
    restart: unless-stopped

volumes:
  mc-data:

networks:
  mc-net:
    driver: bridge
